[build]
  # Configura a pasta do frontend como diretório principal para o Netlify
  base = "frontend"
  # Comando para instalar e gerar o site
  command = "npm install && npm run build"
  # Pasta que o Netlify deve servir (onde o Vite coloca o código pronto)
  publish = "dist"

[build.environment]
  # Configura a URL do seu backend no Railway para o Vite usar durante o build
  VITE_API_URL = "https://web-production-373eb.up.railway.app/api"
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/*"
  to = "https://web-production-373eb.up.railway.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

